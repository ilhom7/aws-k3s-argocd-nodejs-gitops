apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
  namespace: nodejs-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
    spec:
      containers:
        - name: nodejs-app
          image: ghcr.io/ilhom7/aws-k3s-argocd-nodejs-gitops/nodejs-app:38b7b998122ff83a6651857bdcdfab15740f2f90
          ports:
            - containerPort: 3000
          env:
            - name: APP_VERSION
              value: "38b7b998122ff83a6651857bdcdfab15740f2f90"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20